# Per-user workspace namespaces, DevWorkspaces, and RBAC
# Creates pre-provisioned VS Code workspaces for demo users
# Ref: https://docs.redhat.com/en/learn/ai-quickstarts/rh-maas-code-assistant
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-admin
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    openshift.io/display-name: "Workspace admin"
    che.eclipse.org/username: admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wksp-edit-admin
  namespace: wksp-admin
  annotations:
    argocd.argoproj.io/sync-wave: "16"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: admin
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: exercises
  namespace: wksp-admin
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: exercises
        git:
          remotes:
            origin: https://github.com/rh-ai-quickstart/maas-code-assistant.git
          checkoutFrom:
            revision: main
    components:
      - name: tooling-container
        container:
          image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
          sourceMapping: /projects
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-user1
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    openshift.io/display-name: "Workspace user1"
    che.eclipse.org/username: user1
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wksp-edit-user1
  namespace: wksp-user1
  annotations:
    argocd.argoproj.io/sync-wave: "16"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: user1
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: exercises
  namespace: wksp-user1
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: exercises
        git:
          remotes:
            origin: https://github.com/rh-ai-quickstart/maas-code-assistant.git
          checkoutFrom:
            revision: main
    components:
      - name: tooling-container
        container:
          image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
          sourceMapping: /projects
