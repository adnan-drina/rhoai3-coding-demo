# Runtime secrets for RHDH — patched by the PostSync Job with real values.
# SESSION_SECRET: random session signing key
# RHDH_OIDC_CLIENT_SECRET: RHBK client secret for the rhdh OIDC client
# RHDH_BASE_URL: cluster-specific RHDH route URL
# RHBK_METADATA_URL: MTA Keycloak realm OIDC discovery URL
# RHDH_CATALOG_URL: Git catalog URL matching the deployed Argo CD source
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-secrets
  namespace: rhdh
  annotations:
    argocd.argoproj.io/sync-wave: "5"
type: Opaque
stringData:
  SESSION_SECRET: "PLACEHOLDER_WILL_BE_PATCHED"
  RHDH_OIDC_CLIENT_SECRET: "PLACEHOLDER_WILL_BE_PATCHED"
  RHDH_BASE_URL: "https://rhdh.placeholder.example.com"
  RHBK_METADATA_URL: "https://rhbk.placeholder.example.com/auth/realms/mta"
  RHDH_CATALOG_URL: "https://raw.githubusercontent.com/adnan-drina/rhoai3-coding-demo/main/gitops/step-06-developer-hub/base/catalog/all.yaml"
