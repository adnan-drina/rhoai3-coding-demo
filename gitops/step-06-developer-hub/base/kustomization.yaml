apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Step 06: Red Hat Developer Hub — Self-Service Developer Portal
# Deploys RHDH 1.9 as the internal developer portal with OIDC auth
# via MTA Keycloak and a software catalog containing the coolstore app.
# Ref: https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.9

resources:
  # Wave 0-2: RHDH Operator
  - rhdh-operator/namespace.yaml
  - rhdh-operator/operatorgroup.yaml
  - rhdh-operator/subscription.yaml
  # Wave 5: RHDH instance prerequisites (ConfigMaps, Secrets)
  - rhdh-instance/app-config-configmap.yaml
  - rhdh-instance/rhdh-secrets.yaml
  - rhdh-instance/dynamic-plugins-configmap.yaml
  # Wave 10: Backstage CR (RHDH instance)
  - rhdh-instance/backstage.yaml
  # Wave 15: ConsoleLink (OpenShift launcher menu entry)
  - rhdh-instance/consolelink.yaml
  # PostSync: Configure RHDH auth (RHBK client), patch secrets, restart
  - jobs/configure-rhdh.yaml
