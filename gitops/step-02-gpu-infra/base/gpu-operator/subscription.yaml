# GPU Operator 24.3+ required per Red Hat AI prerequisites
# Ref: https://docs.redhat.com/en/documentation/red_hat_ai/3/html/supported_product_and_hardware_configurations/rhaiis-software-prerequisites-for-gpu-deployments_supported-configurations
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: gpu-operator-certified
  namespace: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Transitional compatibility copy. The canonical stage does not pin a channel;
  # OLM uses the certified catalog default channel available in the cluster.
  installPlanApproval: Automatic
  name: gpu-operator-certified
  source: certified-operators
  sourceNamespace: openshift-marketplace
