# Per-user workspace namespaces, RBAC, and DevWorkspaces
# Matches the quickstart: https://github.com/rh-ai-quickstart/maas-code-assistant
# The .vscode/config.yaml in the repo provides the Continue config template.
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-ai-admin
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    openshift.io/display-name: "Workspace ai-admin"
    che.eclipse.org/username: ai-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wksp-edit-ai-admin
  namespace: wksp-ai-admin
  annotations:
    argocd.argoproj.io/sync-wave: "16"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: ai-admin
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: exercises
  namespace: wksp-ai-admin
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: exercises
        git:
          remotes:
            origin: https://github.com/rh-ai-quickstart/maas-code-assistant.git
          checkoutFrom:
            revision: main
    components:
      - name: tooling-container
        container:
          image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
          sourceMapping: /projects
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-ai-developer
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    openshift.io/display-name: "Workspace ai-developer"
    che.eclipse.org/username: ai-developer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wksp-edit-ai-developer
  namespace: wksp-ai-developer
  annotations:
    argocd.argoproj.io/sync-wave: "16"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: ai-developer
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: exercises
  namespace: wksp-ai-developer
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: exercises
        git:
          remotes:
            origin: https://github.com/rh-ai-quickstart/maas-code-assistant.git
          checkoutFrom:
            revision: main
    components:
      - name: tooling-container
        container:
          image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
          sourceMapping: /projects
