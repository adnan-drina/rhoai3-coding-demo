# Per-user workspace namespaces and DevWorkspaces
# The Dev Spaces operator creates its own RBAC when the workspace starts.
# No custom RoleBindings needed — they would cause the namespace to appear
# in the RHOAI AI asset endpoints dropdown.
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-ai-admin
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    che.eclipse.org/username: ai-admin
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: exercises
  namespace: wksp-ai-admin
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: exercises
        git:
          remotes:
            origin: https://github.com/adnan-drina/rhoai3-coding-demo.git
          checkoutFrom:
            revision: main
    components:
      - name: tooling-container
        container:
          image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
          sourceMapping: /projects
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-ai-developer
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    che.eclipse.org/username: ai-developer
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: exercises
  namespace: wksp-ai-developer
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: exercises
        git:
          remotes:
            origin: https://github.com/adnan-drina/rhoai3-coding-demo.git
          checkoutFrom:
            revision: main
    components:
      - name: tooling-container
        container:
          image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
          sourceMapping: /projects
