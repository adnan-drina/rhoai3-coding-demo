# Per-user workspace namespaces and DevWorkspaces
# Clones the MaaS Code Assistant quickstart repo which includes:
# - .vscode/extensions.json (recommends Continue extension)
# - .vscode/config.yaml (Continue model config template)
# - coding-exercises/ (3 game starters + solutions)
# postStart copies the Continue config to ~/.continue/ and opens only
# the coding-exercises folder so the developer sees a clean workspace.
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-ai-admin
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    che.eclipse.org/username: ai-admin
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: coding-exercises
  namespace: wksp-ai-admin
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: maas-code-assistant
        git:
          remotes:
            origin: https://github.com/rh-ai-quickstart/maas-code-assistant.git
          checkoutFrom:
            revision: main
    commands:
      - id: init-continue
        exec:
          commandLine: |
            for i in $(seq 1 30); do
              if [ -f /projects/maas-code-assistant/.vscode/config.yaml ]; then
                mkdir -p ~/.continue
                cp /projects/maas-code-assistant/.vscode/config.yaml ~/.continue/config.yaml
                echo "Continue config copied"
                break
              fi
              sleep 2
            done
          component: tooling-container
    events:
      postStart:
        - init-continue
    components:
      - name: tooling-container
        container:
          image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
          sourceMapping: /projects
          env:
            - name: VSCODE_DEFAULT_WORKSPACE
              value: /projects/maas-code-assistant/coding-exercises
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-ai-developer
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    che.eclipse.org/username: ai-developer
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: coding-exercises
  namespace: wksp-ai-developer
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: maas-code-assistant
        git:
          remotes:
            origin: https://github.com/rh-ai-quickstart/maas-code-assistant.git
          checkoutFrom:
            revision: main
    commands:
      - id: init-continue
        exec:
          commandLine: |
            for i in $(seq 1 30); do
              if [ -f /projects/maas-code-assistant/.vscode/config.yaml ]; then
                mkdir -p ~/.continue
                cp /projects/maas-code-assistant/.vscode/config.yaml ~/.continue/config.yaml
                echo "Continue config copied"
                break
              fi
              sleep 2
            done
          component: tooling-container
    events:
      postStart:
        - init-continue
    components:
      - name: tooling-container
        container:
          image: registry.redhat.io/devspaces/udi-rhel9:3.25.0
          sourceMapping: /projects
          env:
            - name: VSCODE_DEFAULT_WORKSPACE
              value: /projects/maas-code-assistant/coding-exercises
