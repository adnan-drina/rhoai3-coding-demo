apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 050-approved-external-model-access
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-coding-demo
    demo.rhoai.io/stage: "050"
  annotations:
    argocd.argoproj.io/sync-wave: "50"
    argocd.argoproj.io/manifest-generate-paths: gitops/stages/050-approved-external-model-access
  # No finalizer: deleting this Application orphans resources instead of destroying them.
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-coding-demo.git
    targetRevision: main
    path: gitops/stages/050-approved-external-model-access/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: Secret
      namespace: maas
      name: openai-api-key
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec
