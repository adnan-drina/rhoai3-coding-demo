apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step-04-devspaces
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-coding-demo
    demo.rhoai.io/step: "04"
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    argocd.argoproj.io/manifest-generate-paths: gitops/step-04-devspaces
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-coding-demo.git
    targetRevision: main
    path: gitops/step-04-devspaces/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /metadata/annotations
        - /spec/startingCSV
    - group: org.eclipse.che
      kind: CheCluster
      jqPathExpressions:
        - .spec
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec
