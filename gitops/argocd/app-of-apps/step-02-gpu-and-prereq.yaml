apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step-02-gpu-and-prereq
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-coding-demo
    demo.rhoai.io/step: "02"
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/manifest-generate-paths: gitops/step-02-gpu-and-prereq
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-coding-demo.git
    targetRevision: main
    path: gitops/step-02-gpu-and-prereq/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: ConfigMap
      namespace: openshift-monitoring
      name: cluster-monitoring-config
      jsonPointers:
        - /data
        - /metadata/annotations
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
    - group: operators.coreos.com
      kind: OperatorGroup
      jsonPointers:
        - /metadata/annotations
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /metadata/annotations
        - /spec/startingCSV
    - group: nvidia.com
      kind: ClusterPolicy
      jqPathExpressions:
        - .spec
    - group: nfd.openshift.io
      kind: NodeFeatureDiscovery
      jqPathExpressions:
        - .spec
    - group: operator.knative.dev
      kind: KnativeServing
      jsonPointers:
        - /metadata/annotations
        - /spec
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec
