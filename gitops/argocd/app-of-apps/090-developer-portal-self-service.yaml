apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 090-developer-portal-self-service
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-coding-demo
    demo.rhoai.io/stage: "090"
  annotations:
    argocd.argoproj.io/sync-wave: "90"
    argocd.argoproj.io/manifest-generate-paths: gitops/stages/090-developer-portal-self-service
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-coding-demo.git
    targetRevision: main
    path: gitops/stages/090-developer-portal-self-service/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
    - group: operators.coreos.com
      kind: OperatorGroup
      jsonPointers:
        - /metadata/annotations
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /metadata/annotations
        - /spec/startingCSV
    - group: ""
      kind: Secret
      name: rhdh-secrets
      namespace: rhdh
      jsonPointers:
        - /data
    - group: console.openshift.io
      kind: ConsoleLink
      name: rhdh
      jsonPointers:
        - /spec/href
        - /spec/applicationMenu/imageURL
