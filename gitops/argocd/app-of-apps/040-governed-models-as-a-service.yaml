apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 040-governed-models-as-a-service
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-coding-demo
    demo.rhoai.io/stage: "040"
  annotations:
    argocd.argoproj.io/sync-wave: "40"
    argocd.argoproj.io/manifest-generate-paths: gitops/stages/040-governed-models-as-a-service
  # No finalizer: deleting this Application orphans resources instead of destroying them.
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-coding-demo.git
    targetRevision: main
    path: gitops/stages/040-governed-models-as-a-service/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
    - group: operators.coreos.com
      kind: OperatorGroup
      jsonPointers:
        - /metadata/annotations
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /metadata/annotations
        - /spec/startingCSV
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: openshift-ingress
      name: maas-default-gateway
      jsonPointers:
        # The MaaS hostname is patched after sync because it depends on the
        # cluster ingress domain and certificate. Keep the rest of the Gateway
        # spec managed.
        - /spec/listeners/0/hostname
        - /spec/listeners/1/hostname
        - /spec/listeners/1/tls/certificateRefs/0/name
    - group: console.openshift.io
      kind: ConsoleLink
      name: grafana-maas
      jsonPointers:
        # The Grafana route hostname is cluster-specific and generated by the
        # Grafana Operator. A Stage 040 job patches the ConsoleLink after the
        # route exists.
        - /spec/href
        - /spec/applicationMenu/imageURL
    - group: grafana.integreatly.org
      kind: GrafanaDatasource
      namespace: grafana
      name: prometheus
      jsonPointers:
        # The bearer token is minted in-cluster for grafana-sa at sync time.
        # Keep the non-secret datasource shape in Git and ignore only the
        # runtime credential value.
        - /spec/datasource/secureJsonData/httpHeaderValue1
