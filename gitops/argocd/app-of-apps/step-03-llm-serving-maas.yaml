apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: step-03-llm-serving-maas
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: rhoai3-coding-demo
    demo.rhoai.io/step: "03"
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    argocd.argoproj.io/manifest-generate-paths: gitops/step-03-llm-serving-maas
    demo.rhoai.io/deprecated: "true"
    demo.rhoai.io/deprecation-note: "Compatibility app only. Do not apply with canonical stage apps."
  # No finalizer: deleting this Application orphans resources instead of destroying them.
spec:
  project: rhoai-demo
  source:
    repoURL: https://github.com/adnan-drina/rhoai3-coding-demo.git
    targetRevision: main
    path: gitops/step-03-llm-serving-maas/base
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideDiff=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: Secret
      namespace: maas
      name: openai-api-key
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Secret
      namespace: coding-assistant
      jsonPointers:
        - /data
        - /stringData
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
    - group: operators.coreos.com
      kind: OperatorGroup
      jsonPointers:
        - /metadata/annotations
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /metadata/annotations
        - /spec/startingCSV
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: openshift-ingress
      name: maas-default-gateway
      jsonPointers:
        # The MaaS hostname is patched after sync because it depends on the
        # cluster ingress domain and certificate. Keep the rest of the Gateway
        # spec managed.
        - /spec/listeners/0/hostname
        - /spec/listeners/1/hostname
        - /spec/listeners/1/tls/certificateRefs/0/name
