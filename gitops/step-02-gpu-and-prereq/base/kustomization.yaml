apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Infrastructure and operators required for RHOAI 3.4 GPU workloads, KServe, and MaaS
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html-single/installing_and_uninstalling_openshift_ai_self-managed/index

resources:
  - gitops-rbac/cluster-admin-binding.yaml
  - monitoring/cluster-monitoring-config.yaml
  - monitoring/user-workload-monitoring-config.yaml
  - nfd/namespace.yaml
  - nfd/operatorgroup.yaml
  - nfd/subscription.yaml
  - nfd/instance.yaml
  - gpu-operator/namespace.yaml
  - gpu-operator/operatorgroup.yaml
  - gpu-operator/subscription.yaml
  - gpu-operator/clusterpolicy.yaml
  - gpu-operator/dcgm-dashboard-configmap.yaml
  - serverless/namespace.yaml
  - serverless/operatorgroup.yaml
  - serverless/subscription.yaml
  - serverless/knative-serving-namespace.yaml
  - serverless/knative-serving.yaml
  - leaderworkerset/namespace.yaml
  - leaderworkerset/operatorgroup.yaml
  - leaderworkerset/subscription.yaml
  - rhcl-operator/namespace.yaml
  - rhcl-operator/operatorgroup.yaml
  - rhcl-operator/subscription.yaml
  - cert-manager/namespace.yaml
  - cert-manager/operatorgroup.yaml
  - cert-manager/subscription.yaml
  - gateway/gatewayclass.yaml
  - gateway/maas-gateway.yaml
  - cloudnative-pg/subscription.yaml
