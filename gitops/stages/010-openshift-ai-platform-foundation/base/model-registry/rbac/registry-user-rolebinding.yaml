apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-developer-registry-user
  namespace: rhoai-model-registries
  annotations:
    argocd.argoproj.io/sync-wave: "15"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: registry-user-demo-registry
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: ai-developer
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: rhoai-users
