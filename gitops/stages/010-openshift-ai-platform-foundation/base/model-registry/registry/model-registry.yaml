apiVersion: modelregistry.opendatahub.io/v1beta1
kind: ModelRegistry
metadata:
  name: demo-registry
  namespace: rhoai-model-registries
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: "Demo Registry"
    openshift.io/description: "Model governance registry for the RHOAI coding demo"
spec:
  grpc:
    port: 9090
  rest:
    port: 8080
    serviceRoute: enabled
  postgres:
    host: model-registry-db.rhoai-model-registries.svc.cluster.local
    port: 5432
    database: model_registry
    username: mlmd
    skipDBCreation: false
    passwordSecret:
      name: model-registry-db-creds
      key: database-password
    sslMode: disable
