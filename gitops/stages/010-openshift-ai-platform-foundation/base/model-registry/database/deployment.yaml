apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry-db
  namespace: rhoai-model-registries
  labels:
    app: model-registry-db
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-registry-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: model-registry-db
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
              name: postgresql
              protocol: TCP
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: model-registry-db-creds
                  key: database-name
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: model-registry-db-creds
                  key: database-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: model-registry-db-creds
                  key: database-password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: model-registry-db-pvc
