apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GPU Infrastructure — hardware detection, NVIDIA driver/runtime, GPU nodes
# GPU MachineSet creation is handled by an in-cluster Job (gitops-catalog pattern).
# Ref: https://docs.redhat.com/en/documentation/openshift_container_platform/4.20/html/hardware_accelerators/nvidia-gpu-architecture

resources:
  # Wave -10..0: NFD + GPU Operator subscriptions
  - nfd/namespace.yaml
  - nfd/operatorgroup.yaml
  - nfd/subscription.yaml
  - nfd/instance.yaml
  - gpu-operator/namespace.yaml
  - gpu-operator/operatorgroup.yaml
  - gpu-operator/subscription.yaml
  # Wave 10: GPU Operator instances
  - gpu-operator/clusterpolicy.yaml
  - gpu-operator/dcgm-dashboard-configmap.yaml
  # Wave 20: GPU MachineSet Job
  - jobs/aws-gpu-machineset.yaml
