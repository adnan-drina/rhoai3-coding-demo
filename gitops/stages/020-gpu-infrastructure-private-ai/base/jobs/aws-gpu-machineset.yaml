# Creates GPU MachineSets by cloning an existing worker MachineSet.
# Based on redhat-cop/gitops-catalog aws-gpu-machineset pattern.
# Discovers cluster-specific values (ID, AMI, AZ) from the cluster itself.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-aws-gpu-machineset
  namespace: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "19"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-aws-gpu-machineset
  annotations:
    argocd.argoproj.io/sync-wave: "19"
rules:
- apiGroups: ["machine.openshift.io"]
  resources: ["machinesets"]
  verbs: ["*"]
- apiGroups: ["config.openshift.io"]
  resources: ["infrastructures"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-aws-gpu-machineset
  annotations:
    argocd.argoproj.io/sync-wave: "19"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-aws-gpu-machineset
subjects:
- kind: ServiceAccount
  name: job-aws-gpu-machineset
  namespace: nvidia-gpu-operator
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: job-aws-gpu-machineset
  namespace: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "19"
data:
  job.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    INSTANCE_TYPE=${INSTANCE_TYPE:-g6e.2xlarge}
    REPLICAS=${REPLICAS:-2}
    INSTANCE_FAMILY="${INSTANCE_TYPE%.*}"

    echo "=== GPU MachineSet Creator ==="
    echo "Instance type: $INSTANCE_TYPE"
    echo "Replicas: $REPLICAS"

    MS_NAME=$(oc -n openshift-machine-api get machinesets.machine.openshift.io -o name | grep "${INSTANCE_FAMILY}" | head -n1 || true)

    if [ -z "$MS_NAME" ]; then
      # Clone from an existing worker MachineSet
      MACHINE_SET=$(oc -n openshift-machine-api get machinesets.machine.openshift.io -o name | grep worker | head -n1)
      if [ -z "$MACHINE_SET" ]; then
        echo "ERROR: No worker MachineSet found to clone"
        exit 1
      fi

      echo "Cloning from: $MACHINE_SET"
      oc -n openshift-machine-api get "$MACHINE_SET" -o yaml | \
        sed '/machine/ s/-worker/-'"${INSTANCE_TYPE}"'/g
          /name/ s/-worker/-'"${INSTANCE_FAMILY}"'/g
          s/instanceType.*/instanceType: '"${INSTANCE_TYPE}"'/
          s/replicas.*/replicas: '"${REPLICAS}"'/' | \
        oc apply -f -

      MS_NAME=$(oc -n openshift-machine-api get machinesets.machine.openshift.io -o name | grep "${INSTANCE_FAMILY}" | head -n1)
      echo "Created: $MS_NAME"
    else
      echo "MachineSet for ${INSTANCE_TYPE} already exists: $MS_NAME"
    fi

    # Add GPU node label + taint to the MachineSet template. This affects
    # replacement Machines and any new replicas.
    oc -n openshift-machine-api patch "$MS_NAME" --type=merge \
      --patch '{"spec":{"template":{"spec":{"metadata":{"labels":{"node-role.kubernetes.io/gpu":""}}}}}}'

    oc -n openshift-machine-api patch "$MS_NAME" --type=merge \
      --patch '{"spec":{"template":{"spec":{"taints":[{"key":"nvidia.com/gpu","value":"true","effect":"NoSchedule"}]}}}}'

    oc -n openshift-machine-api patch "$MS_NAME" --type=merge \
      --patch '{"spec":{"template":{"spec":{"providerSpec":{"value":{"instanceType":"'"${INSTANCE_TYPE}"'"}}}}}}'

    # Increase root volume to 200GB for large model images (gpt-oss-20b is ~40GB)
    oc -n openshift-machine-api patch "$MS_NAME" --type=json \
      --patch '[{"op":"replace","path":"/spec/template/spec/providerSpec/value/blockDevices/0/ebs/volumeSize","value":200}]' 2>/dev/null || \
    echo "WARN: Could not patch volume size (blockDevices path may differ)"

    # The MachineSet can create initial Machines before the template patch is
    # observed. Repair live nodes as well so validation and scheduling are
    # deterministic during the same demo run.
    for NODE in $(oc get nodes -l "node.kubernetes.io/instance-type=${INSTANCE_TYPE}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null); do
      echo "Configuring live GPU node: $NODE"
      oc label node "$NODE" node-role.kubernetes.io/gpu="" --overwrite
      oc adm taint node "$NODE" nvidia.com/gpu=true:NoSchedule --overwrite
    done

    echo "GPU MachineSet configured: $MS_NAME (${REPLICAS} replicas)"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-aws-gpu-machineset
  namespace: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: job-aws-gpu-machineset
      restartPolicy: Never
      containers:
      - name: create-machineset
        image: registry.redhat.io/openshift4/ose-cli
        env:
        - name: INSTANCE_TYPE
          value: "g6e.2xlarge"
        - name: REPLICAS
          value: "2"
        command:
        - /bin/bash
        - -c
        - /scripts/job.sh
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: job-aws-gpu-machineset
          defaultMode: 0755
