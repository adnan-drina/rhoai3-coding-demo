# Per-user workspace namespaces, RBAC, and DevWorkspaces
# Uses che-incubator/cli-ai-tools image (OpenCode, Aider, Goose pre-installed).
# Continue extension auto-installed via DEFAULT_EXTENSIONS + postStart.
# Continue config auto-copied to ~/.continue/config.yaml via postStart.
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-kubeadmin
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    openshift.io/display-name: "Workspace kubeadmin"
    che.eclipse.org/username: kube:admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wksp-edit-kubeadmin
  namespace: wksp-kubeadmin
  annotations:
    argocd.argoproj.io/sync-wave: "16"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: "b64:a3ViZTphZG1pbg=="
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: exercises
  namespace: wksp-kubeadmin
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: coding-exercises
        git:
          remotes:
            origin: https://github.com/adnan-drina/coding-exercises.git
          checkoutFrom:
            revision: main
    commands:
      - id: init-ai-tools
        exec:
          commandLine: |
            for i in $(seq 1 30); do [ -f /projects/coding-exercises/.vscode/config.yaml ] && break; sleep 2; done
            mkdir -p ~/.continue
            cp /projects/coding-exercises/.vscode/config.yaml ~/.continue/config.yaml 2>/dev/null
            curl -fsSL --max-time 120 -o /tmp/continue.vsix "https://open-vsx.org/api/Continue/continue/linux-x64/1.3.38/file/Continue.continue-1.3.38@linux-x64.vsix" 2>/dev/null || true
          component: tooling-container
    events:
      postStart:
        - init-ai-tools
    components:
      - name: tooling-container
        container:
          image: quay.io/che-incubator/cli-ai-tools:latest
          sourceMapping: /projects
          memoryLimit: 4Gi
          memoryRequest: 1Gi
          cpuLimit: "2"
          cpuRequest: 500m
          env:
            - name: DEFAULT_EXTENSIONS
              value: "/tmp/continue.vsix"
            - name: SHELL
              value: "/usr/bin/bash"
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-ai-admin
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    openshift.io/display-name: "Workspace ai-admin"
    che.eclipse.org/username: ai-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wksp-edit-ai-admin
  namespace: wksp-ai-admin
  annotations:
    argocd.argoproj.io/sync-wave: "16"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: ai-admin
---
kind: DevWorkspace
apiVersion: workspace.devfile.io/v1alpha2
metadata:
  name: exercises
  namespace: wksp-ai-admin
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,Replace=true
spec:
  routingClass: che
  contributions:
    - name: ide
      uri: http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest
  template:
    projects:
      - name: coolstore
        git:
          remotes:
            origin: https://github.com/konveyor-ecosystem/coolstore.git
          checkoutFrom:
            revision: main
      - name: coding-exercises
        git:
          remotes:
            origin: https://github.com/adnan-drina/coding-exercises.git
          checkoutFrom:
            revision: main
    commands:
      - id: init-ai-tools
        exec:
          commandLine: |
            for i in $(seq 1 30); do [ -f /projects/coding-exercises/.vscode/config.yaml ] && break; sleep 2; done
            mkdir -p ~/.continue
            cp /projects/coding-exercises/.vscode/config.yaml ~/.continue/config.yaml 2>/dev/null
            curl -fsSL --max-time 120 -o /tmp/continue.vsix "https://open-vsx.org/api/Continue/continue/linux-x64/1.3.38/file/Continue.continue-1.3.38@linux-x64.vsix" 2>/dev/null || true
            curl -fsSL --max-time 120 -o /tmp/mta.vsix "https://open-vsx.org/api/redhat/mta-vscode-extension/8.1.1/file/redhat.mta-vscode-extension-8.1.1.vsix" 2>/dev/null || true
            curl -fsSL --max-time 120 -o /tmp/mta-core.vsix "https://open-vsx.org/api/redhat/mta-core/8.1.1/file/redhat.mta-core-8.1.1.vsix" 2>/dev/null || true
            curl -fsSL --max-time 120 -o /tmp/mta-java.vsix "https://open-vsx.org/api/redhat/mta-java/8.1.1/file/redhat.mta-java-8.1.1.vsix" 2>/dev/null || true
          component: tooling-container
    events:
      postStart:
        - init-ai-tools
    components:
      - name: tooling-container
        container:
          image: quay.io/che-incubator/cli-ai-tools:latest
          sourceMapping: /projects
          memoryLimit: 6Gi
          memoryRequest: 2Gi
          cpuLimit: "2"
          cpuRequest: 500m
          env:
            - name: DEFAULT_EXTENSIONS
              value: "/tmp/continue.vsix,/tmp/mta.vsix,/tmp/mta-core.vsix,/tmp/mta-java.vsix"
            - name: SHELL
              value: "/usr/bin/bash"
