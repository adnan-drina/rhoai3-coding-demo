apiVersion: apps/v1
kind: Deployment
metadata:
  name: brightdata-mcp
  namespace: coding-assistant
  labels:
    app: brightdata-mcp
    app.kubernetes.io/part-of: mcp-integration
    app.kubernetes.io/component: mcp-server
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: brightdata-mcp
  template:
    metadata:
      labels:
        app: brightdata-mcp
        app.kubernetes.io/part-of: mcp-integration
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: brightdata-mcp
          image: quay.io/mcp-servers/brightdata-mcp:10-2-2025
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: brightdata-mcp-credentials
                  key: API_TOKEN
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: brightdata-mcp
  namespace: coding-assistant
  labels:
    app: brightdata-mcp
    app.kubernetes.io/part-of: mcp-integration
  annotations:
    argocd.argoproj.io/sync-wave: "16"
spec:
  type: ClusterIP
  selector:
    app: brightdata-mcp
  ports:
    - name: sse
      port: 3000
      targetPort: 3000
      protocol: TCP
