# RHDH 1.9 Operator via fast-1.9 channel (z-stream updates only)
# Ref: https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.9/html/installing_red_hat_developer_hub_on_openshift_container_platform/index
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhdh
  namespace: rhdh-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
