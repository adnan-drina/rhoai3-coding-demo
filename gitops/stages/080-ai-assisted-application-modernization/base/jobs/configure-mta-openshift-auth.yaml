# PostSync Job: configures OpenShift OAuth federation in MTA's Keycloak (RHBK).
#
# Creates an openshift-v4 identity provider in the mta realm so
# ai-admin and ai-developer can log into MTA with their cluster credentials.
# Also patches the OAuthClient with a generated secret and the live MTA redirect URI.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-configure-mta-auth
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-configure-mta-auth
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-configure-mta-auth
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
rules:
- apiGroups: ["oauth.openshift.io"]
  resources: ["oauthclients"]
  verbs: ["get", "patch"]
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list"]
- apiGroups: ["user.openshift.io"]
  resources: ["users"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-configure-mta-auth
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
subjects:
- kind: ServiceAccount
  name: job-configure-mta-auth
  namespace: openshift-mta
roleRef:
  kind: Role
  name: job-configure-mta-auth
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-configure-mta-auth
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
subjects:
- kind: ServiceAccount
  name: job-configure-mta-auth
  namespace: openshift-mta
roleRef:
  kind: ClusterRole
  name: job-configure-mta-auth
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-configure-mta-openshift-auth
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: job-configure-mta-auth
      containers:
      - name: configure
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          RHBK_URL="https://mta-rhbk-service.openshift-mta.svc:8443"
          REALM="mta"
          IDP_ALIAS="openshift"
          OAUTH_CLIENT_NAME="mta-keycloak"

          # --- 1. Discover MTA route ---
          echo "Discovering MTA route..."
          MTA_HOST=""
          for i in {1..30}; do
            MTA_HOST=$(oc get route mta -n openshift-mta -o jsonpath='{.spec.host}' 2>/dev/null || true)
            if [ -n "$MTA_HOST" ]; then break; fi
            echo "Waiting for MTA route... ($i/30)"
            sleep 10
          done
          if [ -z "$MTA_HOST" ]; then
            echo "ERROR: MTA route not found"
            exit 1
          fi
          MTA_URL="https://${MTA_HOST}"
          REDIRECT_URI="${MTA_URL}/auth/realms/${REALM}/broker/${IDP_ALIAS}/endpoint"
          echo "MTA URL: ${MTA_URL}"
          echo "Redirect URI: ${REDIRECT_URI}"

          # --- 2. Discover OpenShift API URL ---
          echo "Discovering OpenShift API URL..."
          OCP_API=$(oc whoami --show-server 2>/dev/null || true)
          if [ -z "$OCP_API" ]; then
            echo "ERROR: Cannot determine OpenShift API URL"
            exit 1
          fi
          echo "OpenShift API: ${OCP_API}"

          # --- 3. Generate or reuse OAuth client secret ---
          echo "Checking OAuthClient secret..."
          CURRENT_SECRET=$(oc get oauthclient ${OAUTH_CLIENT_NAME} -o jsonpath='{.secret}' 2>/dev/null || echo "")
          if [ -z "$CURRENT_SECRET" ] || [ "$CURRENT_SECRET" = "PLACEHOLDER_WILL_BE_PATCHED" ]; then
            CLIENT_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 40)
            echo "Generated new OAuth client secret"
          else
            CLIENT_SECRET="$CURRENT_SECRET"
            echo "Reusing existing OAuth client secret"
          fi

          # --- 4. Patch OAuthClient ---
          echo "Patching OAuthClient..."
          oc patch oauthclient ${OAUTH_CLIENT_NAME} --type=merge \
            -p "{\"secret\":\"${CLIENT_SECRET}\",\"redirectURIs\":[\"${REDIRECT_URI}\"]}"
          echo "OAuthClient patched"

          # --- 5. Get RHBK admin token ---
          echo "Getting RHBK admin token..."
          RHBK_ADMIN_PASS=$(oc get secret mta-keycloak-rhbk -n openshift-mta \
            -o jsonpath='{.data.password}' | base64 -d)

          for i in {1..30}; do
            ADMIN_TOKEN=$(curl -sk -X POST \
              "${RHBK_URL}/auth/realms/master/protocol/openid-connect/token" \
              -d "grant_type=password&client_id=admin-cli&username=admin&password=${RHBK_ADMIN_PASS}" \
              2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || echo "")
            if [ -n "$ADMIN_TOKEN" ]; then break; fi
            echo "Waiting for RHBK... ($i/30)"
            sleep 10
          done
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "ERROR: Cannot get RHBK admin token"
            exit 1
          fi
          echo "Got RHBK admin token"

          AUTH_HEADER="Authorization: Bearer ${ADMIN_TOKEN}"

          # --- 6. Create/update openshift-v4 IdP ---
          echo "Configuring OpenShift IdP in RHBK realm '${REALM}'..."

          EXISTING_IDP=$(curl -sk -H "${AUTH_HEADER}" \
            "${RHBK_URL}/auth/admin/realms/${REALM}/identity-provider/instances/${IDP_ALIAS}" \
            -o /dev/null -w "%{http_code}" 2>/dev/null)

          IDP_PAYLOAD=$(cat <<IDPEOF
          {
            "alias": "${IDP_ALIAS}",
            "displayName": "Log in with OpenShift",
            "providerId": "openshift-v4",
            "enabled": true,
            "trustEmail": true,
            "storeToken": false,
            "addReadTokenRoleOnCreate": false,
            "firstBrokerLoginFlowAlias": "first broker login",
            "config": {
              "baseUrl": "${OCP_API}",
              "clientId": "${OAUTH_CLIENT_NAME}",
              "clientSecret": "${CLIENT_SECRET}",
              "syncMode": "IMPORT",
              "defaultScope": "user:info"
            }
          }
          IDPEOF
          )

          if [ "$EXISTING_IDP" = "200" ]; then
            echo "Updating existing IdP '${IDP_ALIAS}'..."
            HTTP_CODE=$(curl -sk -X PUT -H "${AUTH_HEADER}" -H "Content-Type: application/json" \
              "${RHBK_URL}/auth/admin/realms/${REALM}/identity-provider/instances/${IDP_ALIAS}" \
              -d "${IDP_PAYLOAD}" -o /dev/null -w "%{http_code}" 2>/dev/null)
          else
            echo "Creating new IdP '${IDP_ALIAS}'..."
            HTTP_CODE=$(curl -sk -X POST -H "${AUTH_HEADER}" -H "Content-Type: application/json" \
              "${RHBK_URL}/auth/admin/realms/${REALM}/identity-provider/instances" \
              -d "${IDP_PAYLOAD}" -o /dev/null -w "%{http_code}" 2>/dev/null)
          fi
          echo "IdP response: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "ERROR: Failed to configure IdP (HTTP ${HTTP_CODE})"
            curl -sk -X POST -H "${AUTH_HEADER}" -H "Content-Type: application/json" \
              "${RHBK_URL}/auth/admin/realms/${REALM}/identity-provider/instances" \
              -d "${IDP_PAYLOAD}" 2>&1
            exit 1
          fi

          # --- 7. Pre-create demo users with roles and IdP links ---
          # Pre-creating users avoids the "first broker login" flow and ensures
          # correct roles are assigned before the user ever logs in.
          # The hardcoded-role-idp-mapper causes NullPointerException in RHBK 24.x,
          # so we assign roles directly to pre-created users instead.

          ROLES_JSON=$(curl -sk -H "${AUTH_HEADER}" \
            "${RHBK_URL}/auth/admin/realms/${REALM}/roles" 2>/dev/null)

          create_user_with_role() {
            local USERNAME="$1" ROLE_NAME="$2" EMAIL="$3" FIRST="$4" LAST="$5"

            # The openshift-v4 provider uses the OpenShift user UID as the
            # federated identity userId, not the username. Look it up.
            OCP_USER_UID=$(oc get user "${USERNAME}" -o jsonpath='{.metadata.uid}' 2>/dev/null || echo "")
            if [ -z "$OCP_USER_UID" ]; then
              echo "WARNING: OpenShift user '${USERNAME}' not found, skipping"
              return
            fi

            EXISTING=$(curl -sk -H "${AUTH_HEADER}" \
              "${RHBK_URL}/auth/admin/realms/${REALM}/users?username=${USERNAME}&exact=true" 2>/dev/null)
            EXISTS=$(echo "$EXISTING" | python3 -c "import sys,json; print('yes' if len(json.load(sys.stdin))>0 else 'no')" 2>/dev/null)

            if [ "$EXISTS" != "yes" ]; then
              curl -sk -X POST -H "${AUTH_HEADER}" -H "Content-Type: application/json" \
                "${RHBK_URL}/auth/admin/realms/${REALM}/users" \
                -d "{\"username\":\"${USERNAME}\",\"enabled\":true,\"emailVerified\":true,\"email\":\"${EMAIL}\",\"firstName\":\"${FIRST}\",\"lastName\":\"${LAST}\"}" \
                -o /dev/null
              echo "Created user: ${USERNAME}"
            else
              echo "User exists: ${USERNAME}"
            fi

            USER_ID=$(curl -sk -H "${AUTH_HEADER}" \
              "${RHBK_URL}/auth/admin/realms/${REALM}/users?username=${USERNAME}&exact=true" 2>/dev/null \
              | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])" 2>/dev/null)
            ROLE_ID=$(echo "$ROLES_JSON" | python3 -c "
          import sys,json
          for r in json.load(sys.stdin):
            if r['name'] == '${ROLE_NAME}':
              print(r['id']); break
          " 2>/dev/null)

            if [ -n "$USER_ID" ] && [ -n "$ROLE_ID" ]; then
              curl -sk -X POST -H "${AUTH_HEADER}" -H "Content-Type: application/json" \
                "${RHBK_URL}/auth/admin/realms/${REALM}/users/${USER_ID}/role-mappings/realm" \
                -d "[{\"id\":\"${ROLE_ID}\",\"name\":\"${ROLE_NAME}\"}]" -o /dev/null
              echo "  Assigned role: ${ROLE_NAME}"
            fi

            # Delete stale link if userId changed, then create with correct UID
            curl -sk -X DELETE -H "${AUTH_HEADER}" \
              "${RHBK_URL}/auth/admin/realms/${REALM}/users/${USER_ID}/federated-identity/${IDP_ALIAS}" \
              -o /dev/null 2>/dev/null
            curl -sk -X POST -H "${AUTH_HEADER}" -H "Content-Type: application/json" \
              "${RHBK_URL}/auth/admin/realms/${REALM}/users/${USER_ID}/federated-identity/${IDP_ALIAS}" \
              -d "{\"identityProvider\":\"${IDP_ALIAS}\",\"userId\":\"${OCP_USER_UID}\",\"userName\":\"${USERNAME}\"}" \
              -o /dev/null
            echo "  Linked to OpenShift IdP (uid=${OCP_USER_UID})"
          }

          echo "Configuring demo users..."
          create_user_with_role "ai-admin" "tackle-admin" "ai-admin@demo.local" "AI" "Admin"
          create_user_with_role "ai-developer" "tackle-migrator" "ai-developer@demo.local" "AI" "Developer"

          echo ""
          echo "=== OpenShift OAuth federation configured ==="
          echo "MTA login URL: ${MTA_URL}"
          echo "Users will see 'Log in with OpenShift' on the login page"
          echo "  ai-admin     -> tackle-admin (full admin)"
          echo "  ai-developer -> tackle-migrator (analyst)"
