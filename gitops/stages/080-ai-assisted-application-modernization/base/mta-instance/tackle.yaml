# MTA instance with Red Hat Developer Lightspeed AI configuration
# Connects to MaaS Gateway for AI-assisted code modernization
# Ref: https://docs.redhat.com/en/documentation/migration_toolkit_for_applications/8.1/html-single/configuring_and_using_red_hat_developer_lightspeed_for_mta/index
apiVersion: tackle.konveyor.io/v1alpha1
kind: Tackle
metadata:
  name: mta
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  rwx_supported: "false"
  kai_llm_proxy_enabled: true
  kai_solution_server_enabled: true
  kai_llm_provider: openai
  kai_llm_model: nemotron-3-nano-30b-a3b
  kai_llm_baseurl: "https://maas.placeholder.example.com/maas/nemotron-3-nano-30b-a3b/v1"
