# MaaS API key for Red Hat Developer Lightspeed for MTA
# The LLM proxy uses this secret to authenticate with the MaaS Gateway.
# Replace REPLACE_WITH_MAAS_API_KEY with a real sk-oai-* key from the MaaS tab.
# The OPENAI_API_BASE is patched by the post-deploy Job with the cluster-specific URL.
apiVersion: v1
kind: Secret
metadata:
  name: kai-api-keys
  namespace: openshift-mta
  annotations:
    argocd.argoproj.io/sync-wave: "5"
type: Opaque
stringData:
  OPENAI_API_BASE: "https://maas.placeholder.example.com/maas/nemotron-3-nano-30b-a3b/v1"
  OPENAI_API_KEY: "REPLACE_WITH_MAAS_API_KEY"
