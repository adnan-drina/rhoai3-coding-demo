# Restarts KServe after Red Hat Connectivity Link CRDs are installed.
# KServe can cache API discovery before the Kuadrant AuthPolicy CRD exists,
# leaving pre-created LLMInferenceService routes stuck until the controller restarts.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-restart-kserve-controller
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "13"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-restart-kserve-controller
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "13"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-restart-kserve-controller
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "13"
subjects:
  - kind: ServiceAccount
    name: job-restart-kserve-controller
    namespace: redhat-ods-applications
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-restart-kserve-controller
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-restart-kserve-controller
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 240
  template:
    spec:
      serviceAccountName: job-restart-kserve-controller
      restartPolicy: Never
      containers:
        - name: restart
          image: registry.redhat.io/openshift4/ose-cli
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Restarting kserve-controller-manager to refresh API discovery..."
              oc rollout restart deployment/kserve-controller-manager -n redhat-ods-applications
              oc rollout status deployment/kserve-controller-manager -n redhat-ods-applications --timeout=180s
              echo "KServe controller restart completed"
