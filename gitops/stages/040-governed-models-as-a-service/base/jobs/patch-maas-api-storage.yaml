# Pins the tenant-managed maas-api deployment to the upstream image that supports
# ExternalModel discovery while preserving the RHOAI-generated TLS service shape.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-patch-maas-api-storage
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "19"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-patch-maas-api-storage
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "19"
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-patch-maas-api-storage
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "19"
subjects:
- kind: ServiceAccount
  name: job-patch-maas-api-storage
  namespace: redhat-ods-applications
roleRef:
  kind: Role
  name: job-patch-maas-api-storage
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-patch-maas-api-storage
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "19"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: job-patch-maas-api-storage
      containers:
      - name: patch
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          MAAS_API_IMAGE="quay.io/opendatahub/maas-api:latest"

          oc patch configmap maas-parameters -n redhat-ods-applications --type=merge \
            -p "{\"data\":{\"maas-api-image\":\"${MAAS_API_IMAGE}\"}}"

          for i in {1..60}; do
            TENANT="$(oc get deployment maas-api -n redhat-ods-applications -o jsonpath='{.metadata.labels.maas\.opendatahub\.io/tenant-name}' 2>/dev/null || true)"
            if [ "$TENANT" = "default-tenant" ]; then
              break
            fi
            echo "Waiting for tenant-managed maas-api deployment... ($i/60)"
            sleep 5
          done

          if [ "${TENANT:-}" != "default-tenant" ]; then
            echo "tenant-managed maas-api deployment not found"
            exit 1
          fi

          oc patch deployment maas-api -n redhat-ods-applications --type=json -p '[
            {"op": "add", "path": "/spec/template/spec/containers/0/command", "value": ["/app/maas-api"]},
            {"op": "replace", "path": "/spec/template/spec/containers/0/image", "value": "'"${MAAS_API_IMAGE}"'"},
            {"op": "add", "path": "/spec/template/spec/containers/0/args", "value": []}
          ]'

          oc rollout status deployment/maas-api -n redhat-ods-applications --timeout=180s
