# Creates Grafana ServiceAccount with cluster-monitoring-view role
# and injects the token into the GrafanaDatasource.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-configure-grafana
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "21"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-configure-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "21"
rules:
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["create", "get"]
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterrolebindings"]
  verbs: ["create", "get"]
- apiGroups: ["grafana.integreatly.org"]
  resources: ["grafanadatasources"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-configure-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "21"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-configure-grafana
subjects:
- kind: ServiceAccount
  name: job-configure-grafana
  namespace: grafana
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-configure-grafana-sa
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "22"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: job-configure-grafana
      restartPolicy: Never
      containers:
      - name: configure
        image: registry.redhat.io/openshift4/ose-cli
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Creating grafana-sa ServiceAccount..."
          oc create serviceaccount grafana-sa -n grafana 2>/dev/null || true

          echo "Binding cluster-monitoring-view..."
          oc adm policy add-cluster-role-to-user cluster-monitoring-view \
            -z grafana-sa -n grafana 2>/dev/null || true

          echo "Creating long-lived token..."
          TOKEN=$(oc create token grafana-sa -n grafana --duration=87600h 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            echo "Could not create token, skipping datasource patch"
            exit 0
          fi

          echo "Patching GrafanaDatasource with token..."
          for i in $(seq 1 20); do
            if oc get grafanadatasource prometheus -n grafana &>/dev/null; then
              oc patch grafanadatasource prometheus -n grafana --type merge \
                -p "{\"spec\":{\"datasource\":{\"secureJsonData\":{\"httpHeaderValue1\":\"Bearer ${TOKEN}\"}}}}"
              echo "Grafana datasource configured"
              exit 0
            fi
            sleep 5
          done
          echo "GrafanaDatasource not found, skipping"
