apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-ensure-demo-models-subscription
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "18"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-ensure-demo-models-subscription
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "18"
rules:
  - apiGroups: ["maas.opendatahub.io"]
    resources: ["maassubscriptions"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-ensure-demo-models-subscription
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "18"
subjects:
  - kind: ServiceAccount
    name: job-ensure-demo-models-subscription
    namespace: models-as-a-service
roleRef:
  kind: Role
  name: job-ensure-demo-models-subscription
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ensure-demo-models-subscription
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "18"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: job-ensure-demo-models-subscription
      containers:
        - name: apply
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
          args:
            - |
              set -euo pipefail

              existing_models="$(oc get maassubscription demo-models-subscription \
                -n models-as-a-service \
                -o jsonpath='{.spec.modelRefs[*].name}' 2>/dev/null || true)"

              if [[ "$existing_models" == *"gpt-4o"* || "$existing_models" == *"gpt-4o-mini"* ]]; then
                echo "demo-models-subscription already includes external models; leaving Stage 050 expansion intact."
                exit 0
              fi

              cat <<'YAML' | oc apply -f -
              apiVersion: maas.opendatahub.io/v1alpha1
              kind: MaaSSubscription
              metadata:
                name: demo-models-subscription
                namespace: models-as-a-service
                annotations:
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
              spec:
                owner:
                  groups:
                    - name: "system:authenticated"
                    - name: "system:cluster-admins"
                    - name: "tier-free-users"
                    - name: "tier-premium-users"
                    - name: "tier-enterprise-users"
                modelRefs:
                  - name: gpt-oss-20b
                    namespace: maas
                    tokenRateLimits:
                      - limit: 50000
                        window: "1h"
                  - name: nemotron-3-nano-30b-a3b
                    namespace: maas
                    tokenRateLimits:
                      - limit: 50000
                        window: "1h"
              YAML

              echo "demo-models-subscription is present for private model MaaS access."
