apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-expand-demo-models-subscription
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "19"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-expand-demo-models-subscription
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "19"
rules:
  - apiGroups: ["maas.opendatahub.io"]
    resources: ["maassubscriptions"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-expand-demo-models-subscription
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "19"
subjects:
  - kind: ServiceAccount
    name: job-expand-demo-models-subscription
    namespace: models-as-a-service
roleRef:
  kind: Role
  name: job-expand-demo-models-subscription
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-expand-demo-models-subscription-reader
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "19"
rules:
  - apiGroups: ["maas.opendatahub.io"]
    resources: ["maasmodelrefs"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-expand-demo-models-subscription-reader
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "19"
subjects:
  - kind: ServiceAccount
    name: job-expand-demo-models-subscription
    namespace: models-as-a-service
roleRef:
  kind: Role
  name: job-expand-demo-models-subscription-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: expand-demo-models-subscription
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "19"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: job-expand-demo-models-subscription
      containers:
        - name: patch
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
          args:
            - |
              set -euo pipefail

              for model in gpt-oss-20b nemotron-3-nano-30b-a3b gpt-4o gpt-4o-mini; do
                for i in $(seq 1 60); do
                  phase="$(oc get maasmodelref "$model" -n maas -o jsonpath='{.status.phase}' 2>/dev/null || true)"
                  if [[ "$phase" == "Ready" ]]; then
                    break
                  fi
                  echo "Waiting for MaaSModelRef/${model} to be Ready... (${i}/60)"
                  sleep 5
                done
                phase="$(oc get maasmodelref "$model" -n maas -o jsonpath='{.status.phase}' 2>/dev/null || true)"
                if [[ "$phase" != "Ready" ]]; then
                  echo "ERROR: MaaSModelRef/${model} is not Ready; got '${phase:-missing}'"
                  exit 1
                fi
              done

              oc patch maassubscription demo-models-subscription \
                -n models-as-a-service \
                --type=merge \
                -p '{
                  "spec": {
                    "modelRefs": [
                      {
                        "name": "gpt-oss-20b",
                        "namespace": "maas",
                        "tokenRateLimits": [{"limit": 50000, "window": "1h"}]
                      },
                      {
                        "name": "nemotron-3-nano-30b-a3b",
                        "namespace": "maas",
                        "tokenRateLimits": [{"limit": 50000, "window": "1h"}]
                      },
                      {
                        "name": "gpt-4o",
                        "namespace": "maas",
                        "tokenRateLimits": [{"limit": 50000, "window": "1h"}]
                      },
                      {
                        "name": "gpt-4o-mini",
                        "namespace": "maas",
                        "tokenRateLimits": [{"limit": 50000, "window": "1h"}]
                      }
                    ]
                  }
                }'

              echo "demo-models-subscription now covers private and approved external models."
