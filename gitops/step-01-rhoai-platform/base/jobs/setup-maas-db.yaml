# Creates a development PostgreSQL database Secret for MaaS.
# Required before modelsAsService can be set to Managed in the DSC.
# Uses the CloudNative PG operator's default instance if available,
# otherwise creates a minimal Secret pointing to a dev database.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-setup-maas-db
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-setup-maas-db
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "8"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-setup-maas-db
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "8"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-setup-maas-db
subjects:
- kind: ServiceAccount
  name: job-setup-maas-db
  namespace: redhat-ods-applications
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-setup-maas-db
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "9"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: job-setup-maas-db
      restartPolicy: Never
      containers:
      - name: setup
        image: registry.redhat.io/openshift4/ose-cli
        command:
        - /bin/bash
        - -c
        - |
          set -e
          if oc get secret maas-db-config -n redhat-ods-applications &>/dev/null; then
            echo "maas-db-config Secret already exists, skipping"
            exit 0
          fi
          # DEMO VALUES ONLY — not for production
          echo "Creating maas-db-config Secret (dev mode)..."
          oc create secret generic maas-db-config \
            -n redhat-ods-applications \
            --from-literal=DB_CONNECTION_URL='sqlite:///maas.db' \
            --dry-run=client -o yaml | oc apply -f -
          echo "maas-db-config Secret created"
