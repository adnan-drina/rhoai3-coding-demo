# Patches DSCInitialization with the cluster CA bundle.
# Required for LlamaStack distributions to reach internal services over TLS.
# The CA cert is cluster-specific and cannot be committed to git.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-patch-dsci-ca
  namespace: redhat-ods-operator
  annotations:
    argocd.argoproj.io/sync-wave: "14"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-patch-dsci-ca
  annotations:
    argocd.argoproj.io/sync-wave: "14"
rules:
- apiGroups: ["dscinitialization.opendatahub.io"]
  resources: ["dscinitializations"]
  verbs: ["get", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-patch-dsci-ca
  annotations:
    argocd.argoproj.io/sync-wave: "14"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-patch-dsci-ca
subjects:
- kind: ServiceAccount
  name: job-patch-dsci-ca
  namespace: redhat-ods-operator
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-patch-dsci-ca
  namespace: redhat-ods-operator
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: job-patch-dsci-ca
      restartPolicy: Never
      containers:
      - name: patch
        image: registry.redhat.io/openshift4/ose-cli
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Waiting for DSCInitialization..."
          for i in $(seq 1 30); do
            if oc get dscinitializations default-dsci &>/dev/null; then
              break
            fi
            sleep 10
          done

          echo "Reading cluster CA bundle..."
          CA_BUNDLE=$(oc get configmap kube-root-ca.crt -n openshift-config -o jsonpath='{.data.ca\.crt}' 2>/dev/null || true)
          if [ -z "$CA_BUNDLE" ]; then
            echo "No CA bundle found, skipping"
            exit 0
          fi

          CA_JSON=$(echo "$CA_BUNDLE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
          oc patch dscinitializations default-dsci --type merge \
            -p "{\"spec\":{\"trustedCABundle\":{\"managementState\":\"Managed\",\"customCABundle\":${CA_JSON}}}}"
          echo "DSCI CA bundle patched"
