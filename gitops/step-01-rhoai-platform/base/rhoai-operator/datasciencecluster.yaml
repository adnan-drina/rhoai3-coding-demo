# RHOAI 3.4 DataScienceCluster — full component stack
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/installing_and_uninstalling_openshift_ai_self-managed/installing-and-deploying-openshift-ai_install#installing-and-managing-openshift-ai-components_component-install
apiVersion: datasciencecluster.opendatahub.io/v2
kind: DataScienceCluster
metadata:
  name: default-dsc
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    dashboard:
      managementState: Managed
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
    # Renamed in 3.0: datasciencepipelines -> aipipelines
    aipipelines:
      managementState: Managed
      argoWorkflowsControllers:
        managementState: Managed
    # KServe - Primary model serving platform
    kserve:
      managementState: Managed
      modelsAsService:
        managementState: Removed
      rawDeploymentServiceConfig: Headed
    nim:
      managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    llamastackoperator:
      managementState: Managed
    trainingoperator:
      managementState: Managed
    ray:
      managementState: Managed
    kueue:
      managementState: Removed
    trustyai:
      managementState: Managed
      eval:
        lmeval:
          permitOnline: allow
          permitCodeExecution: allow
    feastoperator:
      managementState: Managed
    mlflowoperator:
      managementState: Managed
    trainer:
      managementState: Managed
