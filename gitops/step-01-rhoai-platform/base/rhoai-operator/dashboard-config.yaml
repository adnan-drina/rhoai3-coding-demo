# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html-single/managing_resources/index#dashboard-configuration-options_dashboard-config
apiVersion: opendatahub.io/v1alpha
kind: OdhDashboardConfig
metadata:
  name: odh-dashboard-config
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "15"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  dashboardConfig:
    disableTracking: false
    disableModelRegistry: false
    disableModelCatalog: false
    disableKServeMetrics: false
    genAiStudio: true
    # MaaS dashboard tab requires RHOAI 3.4 GA where maas-ui and maas-api
    # use compatible internal auth. On 3.3.x, maas-ui calls maas-api directly
    # (bypassing Gateway/Authorino) but the API requires X-MaaS-Username header
    # that only Authorino sets. MaaS governance works via Gateway + Grafana.
    modelAsService: false
    disableLMEval: false
    disableDistributedWorkloads: true
    disableKueue: true
    mlflow: true
    observabilityDashboard: true
  hardwareProfileOrder:
    - cpu-small
    - nvidia-l4-1gpu
    - nvidia-l4-4gpu
  notebookController:
    enabled: true
    notebookNamespace: rhods-notebooks
    pvcSize: 40Gi
  notebookSizes:
    - name: Small
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
    - name: Medium
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi
    - name: Large
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          cpu: "8"
          memory: 16Gi
