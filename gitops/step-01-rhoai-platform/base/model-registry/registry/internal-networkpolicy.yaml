# Allows internal pods (like the seed job) to access the Model Registry
# REST API on port 8080, bypassing the OAuth proxy for automation.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: demo-registry-internal-access
  namespace: rhoai-model-registries
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  podSelector:
    matchLabels:
      app: demo-registry
      component: model-registry
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
