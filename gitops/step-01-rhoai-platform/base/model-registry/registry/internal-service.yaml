# Internal service for cluster-internal API access (port 8080).
# The primary service (demo-registry:8443) is OAuth-protected.
# This is used by automation jobs for model registration.
apiVersion: v1
kind: Service
metadata:
  name: demo-registry-internal
  namespace: rhoai-model-registries
  labels:
    app: demo-registry
    component: model-registry
  annotations:
    argocd.argoproj.io/sync-wave: "14"
spec:
  ports:
    - name: http-api
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: demo-registry
    component: model-registry
  type: ClusterIP
