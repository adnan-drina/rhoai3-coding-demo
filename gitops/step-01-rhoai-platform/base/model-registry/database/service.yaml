apiVersion: v1
kind: Service
metadata:
  name: model-registry-db
  namespace: rhoai-model-registries
  labels:
    app: model-registry-db
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  selector:
    app: model-registry-db
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
