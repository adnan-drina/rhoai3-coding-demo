# Token rate limits per MaaS tier — tracks actual token consumption.
# Must be in openshift-ingress (same namespace as the Gateway).
# Source: https://github.com/opendatahub-io/models-as-a-service/blob/v0.0.2/deployment/base/policies/usage-policies/token-limit-policy.yaml
apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: gateway-token-rate-limits
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
  limits:
    free-user-tokens:
      rates:
        - limit: 100
          window: 1m
      when:
        - predicate: |
            auth.identity.tier == "free"
      counters:
        - expression: auth.identity.userid
    premium-user-tokens:
      rates:
        - limit: 50000
          window: 1m
      when:
        - predicate: |
            auth.identity.tier == "premium"
      counters:
        - expression: auth.identity.userid
    enterprise-user-tokens:
      rates:
        - limit: 100000
          window: 1m
      when:
        - predicate: |
            auth.identity.tier == "enterprise"
      counters:
        - expression: auth.identity.userid
