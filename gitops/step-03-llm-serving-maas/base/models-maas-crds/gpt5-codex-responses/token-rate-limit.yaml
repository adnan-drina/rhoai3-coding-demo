# TokenRateLimitPolicy for /v1/responses route.
# Overrides the gateway-default-deny policy which blocks non-/maas-api paths.
apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: gpt-5-codex-responses-trlp
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: gpt-5-codex-responses
  limits:
    responses-tokens:
      rates:
        - limit: 100000
          window: 1m
      counters:
        - expression: auth.identity.userid
