# EnvoyFilter: disable ext_proc.bbr + inject OpenAI credential on gpt-5-codex responses route.
# ext_proc bypass is needed because the BBR payload-processing only supports /chat/completions.
# OpenAI credential is injected via request_headers_to_add (replacing the user's OC token).
#
# IMPORTANT: The OpenAI API key value below is a PLACEHOLDER.
# Replace with the real key via: oc patch envoyfilter gpt5-codex-responses-bypass ...
# or use a post-deploy Job to inject from the openai-api-key Secret.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: gpt5-codex-responses-bypass
  namespace: openshift-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
  configPatches:
  - applyTo: HTTP_ROUTE
    match:
      context: GATEWAY
      routeConfiguration:
        vhost:
          route:
            name: "maas.gpt-5-codex-responses.0"
    patch:
      operation: MERGE
      value:
        typed_per_filter_config:
          envoy.filters.http.ext_proc.bbr:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
            disabled: true
        request_headers_to_add:
        - header:
            key: Authorization
            value: "Bearer REPLACE_WITH_OPENAI_API_KEY"
          append_action: OVERWRITE_IF_EXISTS_OR_ADD
