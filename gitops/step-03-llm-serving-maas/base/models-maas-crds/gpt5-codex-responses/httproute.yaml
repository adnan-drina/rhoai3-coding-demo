# Dedicated HTTPRoute for GPT-5 Codex /v1/responses API.
# Separate from the MaaS-generated gpt-5-codex route because:
# 1. The payload-processing ext_proc only supports /chat/completions body format
# 2. GPT-5 Codex requires /v1/responses (Responses API)
# 3. This route bypasses ext_proc and handles credential injection via EnvoyFilter
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gpt-5-codex-responses
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: maas-default-gateway
    namespace: openshift-ingress
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /maas/gpt-5-codex/v1/responses
    backendRefs:
    - group: ""
      kind: Service
      name: gpt-5-codex
      port: 443
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        set:
        - name: Host
          value: api.openai.com
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /v1/responses
    timeouts:
      request: 300s
