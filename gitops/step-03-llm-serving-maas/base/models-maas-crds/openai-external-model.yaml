# OpenAI external models — accessed via MaaS Gateway with credential injection
# The ExternalModel name MUST match the provider's model name exactly,
# otherwise the payload-processing plugin rejects the request.
# See: https://github.com/opendatahub-io/models-as-a-service/issues/684
#
# gpt-4o / gpt-4o-mini: work in Playground (chat completions compatible)
# gpt-5-codex: API-only via MaaS portal (uses /v1/responses, not chat/completions)
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-api-key
  namespace: maas
  labels:
    inference.networking.k8s.io/bbr-managed: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "16"
type: Opaque
stringData:
  api-key: "REPLACE_WITH_OPENAI_API_KEY"
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: ExternalModel
metadata:
  name: gpt-4o
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider: openai
  targetModel: gpt-4o
  endpoint: api.openai.com
  credentialRef:
    name: openai-api-key
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSModelRef
metadata:
  name: gpt-4o
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  modelRef:
    kind: ExternalModel
    name: gpt-4o
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: ExternalModel
metadata:
  name: gpt-4o-mini
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider: openai
  targetModel: gpt-4o-mini
  endpoint: api.openai.com
  credentialRef:
    name: openai-api-key
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSModelRef
metadata:
  name: gpt-4o-mini
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  modelRef:
    kind: ExternalModel
    name: gpt-4o-mini
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: ExternalModel
metadata:
  name: gpt-5-codex
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider: openai
  targetModel: gpt-5-codex
  endpoint: api.openai.com
  credentialRef:
    name: openai-api-key
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSModelRef
metadata:
  name: gpt-5-codex
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  modelRef:
    kind: ExternalModel
    name: gpt-5-codex
