# Sets Authorino SSL_CERT_FILE so it trusts OpenShift service-ca when calling
# maas-api's internal /internal/v1/api-keys/validate endpoint over TLS.
# Still required in RHOAI 3.4 EA2 — the operator does not configure this.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-configure-authorino
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-configure-authorino
  annotations:
    argocd.argoproj.io/sync-wave: "8"
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-configure-authorino
  annotations:
    argocd.argoproj.io/sync-wave: "8"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-configure-authorino
subjects:
- kind: ServiceAccount
  name: job-configure-authorino
  namespace: kuadrant-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-configure-authorino-ssl
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "9"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    spec:
      serviceAccountName: job-configure-authorino
      restartPolicy: Never
      containers:
      - name: configure
        image: registry.redhat.io/openshift4/ose-cli
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          for i in $(seq 1 30); do
            if oc get deployment authorino -n kuadrant-system &>/dev/null; then
              break
            fi
            echo "Waiting for Authorino deployment... ($i/30)"
            sleep 10
          done
          ENVS=$(oc get deployment authorino -n kuadrant-system -o jsonpath='{.spec.template.spec.containers[0].env[*].name}' 2>/dev/null || echo "")
          if echo "$ENVS" | grep -q SSL_CERT_FILE; then
            echo "Authorino SSL already configured"
          else
            echo "Setting Authorino SSL_CERT_FILE..."
            oc -n kuadrant-system set env deployment/authorino \
              SSL_CERT_FILE=/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
          fi
          echo "Done"
