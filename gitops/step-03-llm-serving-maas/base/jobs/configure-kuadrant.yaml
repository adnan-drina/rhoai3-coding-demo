# Sets Authorino SSL env vars so it trusts OpenShift's internal service-ca.
# Required for MaaS API auth chain. Quickstart's install-maas.sh does this imperatively.
# TLS cert and Authorino CR are handled declaratively in governance/authorino*.yaml.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-configure-kuadrant
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "11"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: job-configure-kuadrant
  annotations:
    argocd.argoproj.io/sync-wave: "11"
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: job-configure-kuadrant
  annotations:
    argocd.argoproj.io/sync-wave: "11"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: job-configure-kuadrant
subjects:
- kind: ServiceAccount
  name: job-configure-kuadrant
  namespace: kuadrant-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-configure-kuadrant
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: job-configure-kuadrant
      restartPolicy: Never
      containers:
      - name: configure
        image: registry.redhat.io/openshift4/ose-cli
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "Waiting for Authorino deployment..."
          for i in $(seq 1 60); do
            if oc get deployment authorino -n kuadrant-system &>/dev/null; then
              echo "Authorino deployment found"
              break
            fi
            echo "  waiting... ($i/60)"
            sleep 10
          done

          echo "Configuring Authorino SSL env vars for internal service-ca trust..."
          EXISTING_ENVS=$(oc get deployment authorino -n kuadrant-system \
            -o jsonpath='{.spec.template.spec.containers[0].env[*].name}' 2>/dev/null || echo "")
          if echo "$EXISTING_ENVS" | grep -q "SSL_CERT_FILE"; then
            echo "  SSL env vars already set, skipping"
          else
            oc -n kuadrant-system set env deployment/authorino \
              SSL_CERT_FILE=/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt \
              REQUESTS_CA_BUNDLE=/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt
            echo "  SSL env vars configured"
          fi

          echo "Waiting for Authorino pods..."
          for i in $(seq 1 30); do
            READY=$(oc get pods -n kuadrant-system -l authorino-resource=authorino --no-headers 2>/dev/null | grep -c Running || true)
            if [ "$READY" -ge 1 ]; then
              echo "Authorino ready"
              exit 0
            fi
            sleep 5
          done
          echo "Done (Authorino may still be converging)"
