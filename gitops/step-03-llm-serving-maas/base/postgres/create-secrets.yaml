# Creates postgres-creds and maas-db-config secrets if they don't exist.
# Password is generated at runtime — secrets are NOT in GitOps.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-postgres-secrets
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "6"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-postgres-secrets
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "6"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-postgres-secrets
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "6"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-postgres-secrets
subjects:
- kind: ServiceAccount
  name: job-postgres-secrets
  namespace: redhat-ods-applications
---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-postgres-secrets
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    spec:
      serviceAccountName: job-postgres-secrets
      restartPolicy: Never
      containers:
      - name: create-secrets
        image: registry.redhat.io/openshift4/ose-cli
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          NS="redhat-ods-applications"
          if oc get secret postgres-creds -n $NS &>/dev/null; then
            echo "postgres-creds already exists"
          else
            PW=$(head -c 24 /dev/urandom | base64 | tr -d '/+=' | head -c 24)
            oc create secret generic postgres-creds -n $NS \
              --from-literal=POSTGRES_USER=maas \
              --from-literal=POSTGRES_DB=maas \
              --from-literal=POSTGRES_PASSWORD="$PW"
            oc create secret generic maas-db-config -n $NS \
              --from-literal=DB_CONNECTION_URL="postgresql://maas:${PW}@postgres.${NS}.svc:5432/maas?sslmode=disable"
            echo "Secrets created"
          fi
