# PostgreSQL for MaaS API — stores API keys and usage data
# The RHOAI 3.4 operator deploys maas-api but expects the database as a prerequisite.
# Ref: https://opendatahub-io.github.io/models-as-a-service/v0.0.2/quickstart/
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  POSTGRES_USER: maas
  POSTGRES_PASSWORD: maas-db-2026
  POSTGRES_DB: maas
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: redhat-ods-applications
  labels:
    app: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: registry.redhat.io/rhel9/postgresql-16:latest
        env:
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: postgres-creds
              key: POSTGRES_USER
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-creds
              key: POSTGRES_PASSWORD
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: postgres-creds
              key: POSTGRES_DB
        ports:
        - containerPort: 5432
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          exec:
            command: ["/usr/libexec/check-container"]
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: redhat-ods-applications
  labels:
    app: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: maas-db-config
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  DB_CONNECTION_URL: "postgresql://maas:maas-db-2026@postgres:5432/maas?sslmode=disable"
