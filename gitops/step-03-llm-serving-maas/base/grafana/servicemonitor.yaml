# Scrape Limitador rate-limit metrics (source for MaaS usage dashboards)
# Ref: https://docs.redhat.com/en/learn/ai-quickstarts/rh-maas-code-assistant
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: limitador-metrics
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/part-of: observability
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app: limitador
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
