# MaaS tier user groups for demo users
# Each user should be in exactly ONE tier group to avoid MaaS subscription conflicts
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/govern_llm_access_with_models-as-a-service/deploy-and-manage-models-as-a-service_maas#maas-tiers_maas-deploy
---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: tier-free-users
  annotations:
    argocd.argoproj.io/sync-wave: "5"
users: []
---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: tier-premium-users
  annotations:
    argocd.argoproj.io/sync-wave: "5"
users:
  - ai-developer
---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: tier-enterprise-users
  annotations:
    argocd.argoproj.io/sync-wave: "5"
users:
  - ai-admin
