apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# LLM Serving with Models-as-a-Service
# Uses upstream maas-controller from opendatahub-io/models-as-a-service
# alongside RHOAI 3.3 operator (modelsAsService: Managed in DSC)

resources:
  # Wave 0-2: MaaS operator prerequisites
  - leaderworkerset/namespace.yaml
  - leaderworkerset/operatorgroup.yaml
  - leaderworkerset/subscription.yaml
  - leaderworkerset/instance.yaml
  - rhcl-operator/namespace.yaml
  - rhcl-operator/operatorgroup.yaml
  - rhcl-operator/subscription.yaml
  - cloudnative-pg/subscription.yaml
  # Wave 0-5: Grafana operator
  - grafana/namespace.yaml
  - grafana/operatorgroup.yaml
  - grafana/subscription.yaml
  - grafana/instance.yaml
  # Wave 5: Kuadrant system namespace (operator creates resources here)
  - governance/kuadrant-system-ns.yaml
  # Wave 5-6: Project namespaces + user RBAC
  - models/namespace.yaml
  - models/admin-rbac.yaml
  - models/developer-project.yaml
  # Wave 9: Tier-to-group mapping (needed by RHOAI webhook for LLMInferenceService)
  - governance/tier-to-group-mapping.yaml
  # Wave 12-14: Upstream maas-controller (CRDs, RBAC, PostgreSQL, controller)
  - maas-controller-upstream/
  # Wave 15: Models (LLMInferenceService CRs)
  - models/gpt-oss-20b.yaml
  - models/nemotron-3-nano-30b.yaml
  # Wave 15-16: MCP servers
  - mcp/
  # Wave 16-18: MaaS CRDs (MaaSModelRef, ExternalModel, AuthPolicy, Subscription)
  - models-maas-crds/
  # Wave 20: Grafana dashboard + Jobs
  - grafana/datasource.yaml
  - grafana/maas-dashboard.yaml
  - grafana/servicemonitor.yaml
  - jobs/configure-grafana-sa.yaml
  # Wave 22: Register models in Model Registry
  - model-registry/seed-models.yaml
