apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: maas-controller
    control-plane: maas-controller
  name: maas-controller
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: '14'
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: maas-controller
  template:
    metadata:
      labels:
        app: maas-controller
        control-plane: maas-controller
    spec:
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --gateway-name=$(GATEWAY_NAME)
        - --gateway-namespace=$(GATEWAY_NAMESPACE)
        - --maas-api-namespace=$(MAAS_API_NAMESPACE)
        - --maas-subscription-namespace=$(MAAS_SUBSCRIPTION_NAMESPACE)
        - --metadata-cache-ttl=60
        - --authz-cache-ttl=60
        command:
        - /manager
        env:
        - name: GATEWAY_NAME
          value: maas-default-gateway
        - name: GATEWAY_NAMESPACE
          value: openshift-ingress
        - name: MAAS_API_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: MAAS_SUBSCRIPTION_NAMESPACE
          value: redhat-ods-applications
        - name: RELATED_IMAGE_ODH_MAAS_API_IMAGE
          valueFrom:
            configMapKeyRef:
              key: maas-api-image
              name: maas-parameters
              optional: true
        - name: RELATED_IMAGE_ODH_MAAS_CONTROLLER_IMAGE
          valueFrom:
            configMapKeyRef:
              key: maas-controller-image
              name: maas-parameters
              optional: true
        - name: RELATED_IMAGE_ODH_AI_GATEWAY_PAYLOAD_PROCESSING_IMAGE
          valueFrom:
            configMapKeyRef:
              key: payload-processing-image
              name: maas-parameters
              optional: true
        - name: RELATED_IMAGE_UBI_MINIMAL_IMAGE
          valueFrom:
            configMapKeyRef:
              key: maas-api-key-cleanup-image
              name: maas-parameters
              optional: true
        image: quay.io/opendatahub/maas-controller:latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
      serviceAccountName: maas-controller
      terminationGracePeriodSeconds: 10
