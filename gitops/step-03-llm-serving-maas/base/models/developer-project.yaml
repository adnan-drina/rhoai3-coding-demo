# coding-assistant project for ai-developer to use with Dev Spaces + Continue extension
---
apiVersion: v1
kind: Namespace
metadata:
  name: coding-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    openshift.io/display-name: "Coding Assistant"
    openshift.io/description: "AI-assisted development with NVIDIA Nemotron via MaaS"
  labels:
    opendatahub.io/dashboard: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-developer-edit
  namespace: coding-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "6"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: ai-developer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-admin-admin
  namespace: coding-assistant
  annotations:
    argocd.argoproj.io/sync-wave: "6"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: ai-admin
