# OpenAI gpt-oss-20b — available to all tiers (free, premium, enterprise)
# Ref: https://docs.redhat.com/en/learn/ai-quickstarts/rh-maas-code-assistant
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: gpt-oss-20b
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    alpha.maas.opendatahub.io/tiers: '["free","premium","enterprise"]'
    openshift.io/display-name: OpenAI gpt-oss-20b
    opendatahub.io/model-type: generative
    security.opendatahub.io/enable-auth: "true"
  labels:
    app.kubernetes.io/part-of: llm-serving
    app.kubernetes.io/component: inference
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
spec:
  model:
    name: gpt-oss-20b
    uri: oci://registry.redhat.io/rhelai1/modelcar-gpt-oss-20b:1.5
  replicas: 1
  router:
    gateway:
      refs:
        - name: maas-default-gateway
          namespace: openshift-ingress
    route: {}
  template:
    containers:
      - name: main
        image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0
        command:
          - python
          - -m
          - vllm.entrypoints.openai.api_server
        args:
          - "--served-model-name={{.Name}}"
          - --model=/mnt/models
          - --enable-ssl-refresh
          - --ssl-certfile=/var/run/kserve/tls/tls.crt
          - --ssl-keyfile=/var/run/kserve/tls/tls.key
          - --enable-force-include-usage
        ports:
          - containerPort: 8000
            name: http
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 300
          periodSeconds: 15
          timeoutSeconds: 15
          failureThreshold: 30
        resources:
          limits:
            cpu: "4"
            memory: 60Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: 16Gi
            nvidia.com/gpu: "1"
        volumeMounts:
          - mountPath: /dev/shm
            name: shm
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
    volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: shm
