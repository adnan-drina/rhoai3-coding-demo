# Per-model RBAC: grant tier ServiceAccounts access to GET LLMInferenceService
# Required for MaaS gateway to authorize requests per tier
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gpt-oss-20b-view-role
  namespace: maas
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "12"
rules:
- apiGroups:
  - serving.kserve.io
  resourceNames:
  - gpt-oss-20b
  resources:
  - llminferenceservices
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gpt-oss-20b-model-get
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "12"
subjects:
  - kind: Group
    name: system:serviceaccounts:maas-default-gateway-tier-free
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: system:serviceaccounts:maas-default-gateway-tier-premium
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: system:serviceaccounts:maas-default-gateway-tier-enterprise
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gpt-oss-20b-view-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nemotron-3-nano-30b-a3b-view-role
  namespace: maas
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "12"
rules:
- apiGroups:
  - serving.kserve.io
  resourceNames:
  - nemotron-3-nano-30b-a3b
  resources:
  - llminferenceservices
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nemotron-3-nano-30b-a3b-model-get
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "12"
subjects:
  - kind: Group
    name: system:serviceaccounts:maas-default-gateway-tier-premium
    apiGroup: rbac.authorization.k8s.io
  - kind: Group
    name: system:serviceaccounts:maas-default-gateway-tier-enterprise
    apiGroup: rbac.authorization.k8s.io
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nemotron-3-nano-30b-a3b-view-role
