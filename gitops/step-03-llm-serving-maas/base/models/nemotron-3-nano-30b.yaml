# NVIDIA Nemotron 3 Nano 30B A3B FP8 — premium + enterprise tiers only
# Primary model for the code assistant demo
# Ref: https://docs.redhat.com/en/learn/ai-quickstarts/rh-maas-code-assistant
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: nemotron-3-nano-30b-a3b
  namespace: maas
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: NVIDIA Nemotron 3 Nano 30B A3B FP8
    opendatahub.io/model-type: generative
    security.opendatahub.io/enable-auth: "true"
  labels:
    app.kubernetes.io/part-of: llm-serving
    app.kubernetes.io/component: inference
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
spec:
  model:
    name: nemotron-3-nano-30b-a3b
    uri: oci://quay.io/jharmison/models:redhatai--nvidia-nemotron-3-nano-30b-a3b-fp8-modelcar
  replicas: 1
  router:
    gateway:
      refs:
        - name: maas-default-gateway
          namespace: openshift-ingress
    route: {}
  template:
    containers:
      - name: main
        image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0
        command:
          - python
          - -m
          - vllm.entrypoints.openai.api_server
        args:
          - "--served-model-name={{.Name}}"
          - --model=/mnt/models
          - --enable-ssl-refresh
          - --ssl-certfile=/var/run/kserve/tls/tls.crt
          - --ssl-keyfile=/var/run/kserve/tls/tls.key
          - --enable-force-include-usage
          - --max-model-len=131072
          - --enable-auto-tool-choice
          - --tool-call-parser=qwen3_coder
          - --trust-remote-code
          - --reasoning-parser-plugin=/mnt/models/nano_v3_reasoning_parser.py
          - --reasoning-parser=nano_v3
        ports:
          - containerPort: 8000
            name: http
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
        resources:
          limits:
            cpu: "4"
            memory: 24Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: 16Gi
            nvidia.com/gpu: "1"
        volumeMounts:
          - mountPath: /dev/shm
            name: shm
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
    volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: shm
