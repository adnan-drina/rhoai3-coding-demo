apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: all-models-enterprise
  namespace: models-as-a-service
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    openshift.io/display-name: "All Models — Enterprise"
    openshift.io/description: "Enterprise tier: 100000 tokens/min for all authenticated users"
spec:
  owner:
    groups:
      - name: system:authenticated
    users: []
  modelRefs:
    - name: gpt-oss-20b
      namespace: maas
      tokenRateLimits:
        - limit: 100000
          window: 1m
    - name: nemotron-3-nano-30b-a3b
      namespace: maas
      tokenRateLimits:
        - limit: 100000
          window: 1m
  priority: 10
