  <text x="186" y="750" class="display white" font-size="30" font-weight="700" text-anchor="middle">as a Service</text>
  <rect x="350" y="640" width="1660" height="190" rx="2" class="laneNew"/>

  <rect x="36" y="850" width="300" height="170" rx="2" class="labelRed"/>
  <text x="186" y="918" class="display white" font-size="30" font-weight="700" text-anchor="middle">OpenShift</text>
  <text x="186" y="954" class="display white" font-size="30" font-weight="700" text-anchor="middle">Container</text>
  <text x="186" y="990" class="display white" font-size="30" font-weight="700" text-anchor="middle">Platform</text>
  <rect x="350" y="850" width="1660" height="170" rx="2" class="laneNew"/>

  <rect x="36" y="1040" width="300" height="110" rx="2" class="labelRed"/>
