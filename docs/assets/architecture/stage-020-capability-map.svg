    <text x="855" y="921" class="body white" font-size="25" text-anchor="middle">Monitoring</text>
    <text x="855" y="951" class="body white" font-size="25" text-anchor="middle">(Prometheus)</text>
    <rect x="1030" y="888" width="270" height="82" rx="2" class="boxOld"/>
    <text x="1165" y="921" class="body white" font-size="25" text-anchor="middle">Operators</text>
    <text x="1165" y="951" class="body white" font-size="25" text-anchor="middle">and CRDs</text>
    <rect x="1340" y="888" width="270" height="82" rx="2" class="boxOld"/>
    <text x="1475" y="921" class="body white" font-size="25" text-anchor="middle">OAuth, RBAC,</text>
