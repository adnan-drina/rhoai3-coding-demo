<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1280" viewBox="0 0 2048 1280" role="img" aria-labelledby="title desc">
  <title id="title">Stage 020: GPU Infrastructure for Private AI</title>
  <desc id="desc">GPU-as-a-Service building blocks for private AI on Red Hat OpenShift AI</desc>
  <style>
    .display{font-family:'Red Hat Display','Arial',sans-serif}
    .body{font-family:'Red Hat Text','Arial',sans-serif}
    .mono{font-family:'Red Hat Mono','Consolas',monospace}
    .lane{fill:none;stroke:#4d4d4d;stroke-width:3}
    .laneNew{fill:none;stroke:#f56e6e;stroke-width:3}
    .label{fill:#1f1f1f}
    .labelRed{fill:#ee0000}
    .box{fill:#151515;stroke:#4d4d4d;stroke-width:2}
    .boxOld{fill:#383838;stroke:#4d4d4d;stroke-width:2}
    .boxNew{fill:#3f0000;stroke:#ee0000;stroke-width:5}
    .muted{fill:#c7c7c7}
    .white{fill:#ffffff}
    .red{fill:#f56e6e}
  </style>
  <defs>
    <radialGradient id="glow" cx="82%" cy="5%" r="70%">
      <stop offset="0" stop-color="#ee0000" stop-opacity="0.16"/>
      <stop offset="0.45" stop-color="#ee0000" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="2048" height="1280" fill="#000000"/>
  <rect width="2048" height="1280" fill="url(#glow)"/>
  <text x="64" y="76" class="display" font-size="52" fill="#ffffff" font-weight="400"><tspan fill="#f56e6e" font-weight="700">Stage 020:</tspan> GPU Infrastructure for Private AI</text>
  <text x="64" y="116" class="body" font-size="26" fill="#c7c7c7">Adds GPU-as-a-Service building blocks: GPU enablement, Kueue queues, quotas, autoscaling readiness, and observability</text>

  <rect x="36" y="150" width="300" height="150" rx="2" class="label"/>
  <text x="186" y="215" class="display white" font-size="30" font-weight="700" text-anchor="middle">Developer</text>
  <text x="186" y="251" class="display white" font-size="30" font-weight="700" text-anchor="middle">Experience</text>
  <rect x="350" y="150" width="1660" height="150" rx="2" class="lane"/>

  <rect x="36" y="320" width="300" height="300" rx="2" class="label"/>
  <text x="186" y="438" class="display white" font-size="30" font-weight="700" text-anchor="middle">OpenShift</text>
  <text x="186" y="474" class="display white" font-size="30" font-weight="700" text-anchor="middle">AI/ML</text>
  <text x="186" y="510" class="display white" font-size="30" font-weight="700" text-anchor="middle">platform</text>
  <rect x="350" y="320" width="1660" height="300" rx="2" class="laneNew"/>

  <rect x="36" y="640" width="300" height="190" rx="2" class="labelRed"/>
