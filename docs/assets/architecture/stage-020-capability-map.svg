  <g>
    <rect x="430" y="1192" width="54" height="54" rx="2" class="boxNew"/>
    <text x="510" y="1226" class="body white" font-size="27">New in this stage</text>
    <rect x="875" y="1192" width="54" height="54" rx="2" class="boxOld"/>
    <text x="955" y="1226" class="body white" font-size="27">Previously introduced</text>
    <rect x="1385" y="1192" width="54" height="54" rx="2" class="box"/>
    <text x="1465" y="1226" class="body white" font-size="27">Used by later stages</text>
